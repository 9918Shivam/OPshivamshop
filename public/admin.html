 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin | OP Electronics</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <link href="style.css" rel="stylesheet" />
</head>
<body>

  <div class="container py-5">
    <a href="index.html" class="text-decoration-none d-block mb-3">
  <i class="bi bi-arrow-left"></i> Back to Home
</a>
    <h2 class="mb-4 text-center">Admin Panel</h2>

    <div id="loginSection" style="max-width:400px;margin:auto">
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" id="adminEmail" class="form-control" placeholder="Enter email" />
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" id="adminPassword" class="form-control" placeholder="Enter password" />
      </div>
      <button class="btn btn-primary w-100 rounded-pill" id="adminLoginBtn">Login</button>
    </div>

    <div id="formSection" class="d-none">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5>Add / Update Product</h5>
        <button class="btn btn-outline-danger btn-sm" onclick="localStorage.removeItem('ope_admin_logged_in'); location.reload();">Logout</button>
      </div>
      <div class="row g-3">
        <div class="col-md-6"><label class="form-label">Name</label><input type="text" id="prodName" class="form-control"></div>
        <div class="col-md-3">
          <label>Price (₹)</label>
          <input type="number" id="prodPrice" class="form-control" />
        </div>
        <div class="form-check mt-2">
          <input class="form-check-input" type="checkbox" id="showPriceChk">
          <label class="form-check-label" for="showPriceChk">
             Show price on homepage
            </label>
          </div>

        <div class="col-md-3">
          <label class="form-label" id="catLabel" style="cursor:pointer;">Category</label>
          <select id="prodCatSelect" class="form-select"></select>
          <input type="text" id="prodCatNew" class="form-control mt-2" placeholder="Or enter new category" />
        </div>
        
        <!-- <div class="col-md-3">
          <label>Category</label>
          <select id="prodCatSelect" class="form-select"></select>
          <input type="text" id="prodCatNew" class="form-control mt-2" placeholder="Or enter new category" />
        </div> -->
        <div class="col-12"><label class="form-label">Features</label><textarea id="prodFeatures" class="form-control" rows="2"></textarea></div>

        
        <div class="col-md-6">
          <label class="form-label">Image 1</label>
          <input type="url" id="prodImg1" placeholder="Paste image URL" class="form-control mb-1">
          <input type="file" accept="image/*" class="form-control" onchange="previewAndEncode(this, 'prodImg1')">
        </div>
        <div class="col-md-6">
          <label class="form-label">Image 2</label>
          <input type="url" id="prodImg2" placeholder="Paste image URL" class="form-control mb-1">
          <input type="file" accept="image/*" class="form-control" onchange="previewAndEncode(this, 'prodImg2')">
        </div>
        <div class="col-md-6">
          <label class="form-label">Image 3</label>
          <input type="url" id="prodImg3" placeholder="Paste image URL" class="form-control mb-1">
          <input type="file" accept="image/*" class="form-control" onchange="previewAndEncode(this, 'prodImg3')">
        </div>
        <div class="col-md-6">
          <label class="form-label">Image 4</label>
          <input type="url" id="prodImg4" placeholder="Paste image URL" class="form-control mb-1">
          <input type="file" accept="image/*" class="form-control" onchange="previewAndEncode(this, 'prodImg4')">
        </div>
        <div class="col-md-6">
          <label class="form-label">Image 5</label>
          <input type="url" id="prodImg5" placeholder="Paste image URL" class="form-control mb-1">
          <input type="file" accept="image/*" class="form-control" onchange="previewAndEncode(this, 'prodImg5')">
        </div>

        <div class="col-md-3">
          <label class="form-label">Primary Image #</label>
          <select id="prodPrimary" class="form-select">
            <option value="0">1</option>
            <option value="1">2</option>
            <option value="2">3</option>
            <option value="3">4</option>
            <option value="4">5</option>
          </select>
        </div>

        <div class="col-12 form-check mt-2">
          <input class="form-check-input" type="checkbox" id="prodBest">
          <label class="form-check-label">Mark as Best Seller</label>
        </div>
      </div>
      <button class="btn btn-success mt-3 rounded-pill" id="addProdBtn">Save Product</button>
      <hr>
      <h6>Current Products</h6>
      <ul class="list-group" id="productList"></ul>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
 console.log("SCRIPT LOADED");
  const API = "https://opelectronicshop.onrender.com";
  let editingProductId = null;
  let currentFetch = null; // ✅ Tracks the current fetch so we can cancel duplicates

  // ─── Render product list ───────────────────────────────────────────────────
  


let renderToken = 0;

async function renderList() {

  const currentToken = ++renderToken;

  const list = document.getElementById('productList');
  if (!list) return;

  list.innerHTML = `
    <li class="list-group-item text-muted p-2">
      Loading...
    </li>
  `;

  try {

    const res = await fetch(API + '/products');

    if (!res.ok) {
      throw new Error('Failed to fetch products');
    }

    const products = await res.json();

    // STOP old renders
    if (currentToken !== renderToken) return;

    // Remove duplicates safely
    const uniqueProducts = [];
    const ids = new Set();

    products.forEach(p => {
      if (!ids.has(p._id)) {
        ids.add(p._id);
        uniqueProducts.push(p);
      }
    });

    // Build FULL HTML first
    let html = '';

    uniqueProducts.forEach(p => {

      const img = p.images?.[p.primary || 0] || '';

      const priceText =
        p.price && p.showPrice
          ? `<span class="text-muted">(₹${p.price})</span>`
          : '';

      html += `
        <li class="list-group-item d-flex justify-content-between align-items-center">

          <div>
            <img src="${img}"
                 style="height:35px;width:35px;object-fit:cover;margin-right:8px;border-radius:4px;">

            <strong>${p.name}</strong>
            ${priceText}

            <br>

            <small class="text-secondary">
              ${p.category}
            </small>
          </div>

          <div>
            <button class="btn btn-sm btn-outline-primary me-1"
                    onclick='fillForm(${JSON.stringify(p)})'>
              Edit
            </button>

            <button class="btn btn-sm btn-outline-danger"
                    onclick='deleteProduct("${p._id}")'>
              Delete
            </button>
          </div>

        </li>
      `;
    });

    list.innerHTML = html;

  } catch (err) {

    console.error(err);

    list.innerHTML = `
      <li class="list-group-item text-danger">
        Failed to load products.
      </li>
    `;
  }
}

  
async function deleteProduct(id) {

  if (!confirm('Delete this product?')) return;

  try {

    const res = await fetch(API + `/products/${id}`, {
      method: 'DELETE'
    });

    if (!res.ok) throw new Error();

    alert('Product deleted');

    renderList();
   console.log("SCRIPT deleted LOADED");

  } catch (err) {

    console.error(err);

    alert('Failed to delete product');
  }
}

  // ─── Fill form for editing ─────────────────────────────────────────────────
  function fillForm(p) {
    document.getElementById('prodName').value = p.name || '';
    document.getElementById('prodPrice').value = p.price || '';
    document.getElementById('prodFeatures').value = p.features || '';
    document.getElementById('prodPrimary').value = p.primary || 0;
    document.getElementById('showPriceChk').checked = !!p.showPrice;

    for (let k = 1; k <= 5; k++) {
      document.getElementById('prodImg' + k).value = (p.images && p.images[k - 1]) || '';
    }

    const catSelect = document.getElementById('prodCatSelect');
    if ([...catSelect.options].some(opt => opt.value === p.category)) {
      catSelect.value = p.category;
    } else {
      const opt = document.createElement('option');
      opt.value = p.category;
      opt.textContent = p.category;
      catSelect.appendChild(opt);
      catSelect.value = p.category;
    }

    document.getElementById('prodCatNew').value = '';
    editingProductId = p._id;
    document.getElementById('formSection').scrollIntoView({ behavior: 'smooth' });
  }

  // ─── Update category dropdown ──────────────────────────────────────────────
  async function updateCategoryDropdown(products = []) {

  const sel = document.getElementById('prodCatSelect');

  if (!sel) return;

  // Use existing products if provided
  let allProducts = products;

  // Only fetch if products not passed
  if (!allProducts.length) {

    const res = await fetch(API + '/products');

    if (!res.ok) return;

    allProducts = await res.json();
  }

  const usedCats = [
    ...new Set(
      allProducts.map(p => p.category).filter(Boolean)
    )
  ];

  sel.innerHTML = `
    <option disabled selected>
      -- Select a category --
    </option>
  `;

  usedCats.forEach(cat => {

    const opt = document.createElement('option');

    opt.value = cat;
    opt.textContent = cat;

    sel.appendChild(opt);
  });
}

  // ─── Reset form ────────────────────────────────────────────────────────────
  function resetForm() {
    document.querySelectorAll('#formSection input[type="text"], #formSection input[type="number"], #formSection input[type="url"], #formSection textarea').forEach(el => el.value = '');
    document.getElementById('prodPrimary').value = 0;
    document.getElementById('showPriceChk').checked = false;
    document.getElementById('prodBest').checked = false;
    editingProductId = null;
  }

  // ─── Preview uploaded image ────────────────────────────────────────────────
  function previewAndEncode(input, targetId) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { document.getElementById(targetId).value = reader.result; };
    reader.readAsDataURL(file);
  }

  // ─── Main DOMContentLoaded ─────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    const adminLoginBtn = document.getElementById('adminLoginBtn');
    const adminEmail    = document.getElementById('adminEmail');
    const adminPassword = document.getElementById('adminPassword');
    const loginSection  = document.getElementById('loginSection');
    const formSection   = document.getElementById('formSection');
    const addProdBtn    = document.getElementById('addProdBtn');

    const correctEmailHash = '75ae7fc7bf509064fec30e237118984dbee108dc5509c48e8b6dc1d97d704876';
    const correctPassHash  = 'daf6a69eeecc349286ed88c0e0a55dbf76826ea5728fe37a6bd0bfa89732f60c';

    // ── Auto-login if session exists ─────────────────────────────────────────
    // ✅ Only ONE place that calls renderList on page load
    if (localStorage.getItem('ope_admin_logged_in') === 'true') {
      loginSection.classList.add('d-none');
      formSection.classList.remove('d-none');
      renderList();
       fetch(API + '/products')
      .then(res => res.json())
      .then(products => {
      updateCategoryDropdown(products);
       console.log("DOMContentLoaded LOADED");
    });
    }

    // ── Admin Login button ───────────────────────────────────────────────────
    adminLoginBtn.onclick = () => {
      const emailInput = adminEmail.value.trim();
      const passInput  = adminPassword.value.trim();

      Promise.all([
        crypto.subtle.digest('SHA-256', new TextEncoder().encode(emailInput)),
        crypto.subtle.digest('SHA-256', new TextEncoder().encode(passInput))
      ]).then(([emailBuf, passBuf]) => {
        const toHex = buf =>
          Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');

        if (toHex(emailBuf) === correctEmailHash && toHex(passBuf) === correctPassHash) {
          localStorage.setItem('ope_admin_logged_in', 'true');
          loginSection.classList.add('d-none');
          formSection.classList.remove('d-none');
          renderList();
          fetch(API + '/products')
            .then(res => res.json())
             .then(products => {
             updateCategoryDropdown(products);
              console.log("SCRIPT adminloginbtn LOADED");
             });
        } else {
          alert('Invalid email or password');
        }
      });
    };

    // ── Save / Update product ────────────────────────────────────────────────
    addProdBtn.onclick = async () => {
      const imgs = [];
      const seen = new Set();
      for (let k = 1; k <= 5; k++) {
        const val = document.getElementById('prodImg' + k).value.trim();
        if (val && !seen.has(val)) { imgs.push(val); seen.add(val); }
      }

      if (!imgs.length) return alert('At least one image is required');

      const category = document.getElementById('prodCatNew').value.trim()
                    || document.getElementById('prodCatSelect').value.trim();
      const name = document.getElementById('prodName').value.trim();

      if (!name || !category || category === '-- Select a category --') {
        return alert('Name and category are required');
      }

      const item = {
        name,
        price:     document.getElementById('prodPrice').value.trim() || '',
        showPrice: document.getElementById('showPriceChk').checked,
        category,
        features:  document.getElementById('prodFeatures').value.trim(),
        images:    imgs,
        primary:   parseInt(document.getElementById('prodPrimary').value) || 0
      };

      addProdBtn.disabled = true;
      addProdBtn.textContent = 'Saving...';

      try {
        let res;
        if (editingProductId) {
          res = await fetch(API + `/products/${editingProductId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(item)
          });
        } else {
          res = await fetch(API + '/products', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(item)
          });
        }

        if (!res.ok) { const text = await res.text(); console.error(text); throw new Error(); }

        alert(editingProductId ? 'Product updated!' : 'Product saved!');
        editingProductId = null;
        resetForm();
        const res2 = await fetch(API + '/products');
        const updatedProducts = await res2.json();

        await renderList();
        updateCategoryDropdown(updatedProducts);
       console.log("SCRIPT addprodbtn LOADED");

      } catch (err) {
        alert('Failed to save product. Please try again.');
        console.error(err);
      } finally {
        addProdBtn.disabled = false;
        addProdBtn.textContent = 'Save Product';
      }
    };

  }); // ← end DOMContentLoaded
</script>

 
</body>
</html>
